# Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: project-n
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow ingress to app pods from the gateway controller namespace
# Update the namespace label to match your gateway controller's namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: project-n
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: project-n
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway-system
      ports:
        - protocol: TCP
          port: 8080

---
# Allow egress to kube-dns only (port 53 UDP+TCP)
# NOTE: The CoreDNS pod label varies by distribution:
#   kubeadm / kind / k3s  → k8s-app: kube-dns
#   EKS                   → k8s-app: kube-dns
#   GKE                   → k8s-app: kube-dns
#   some distros          → app: coredns  (update the podSelector below if needed)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: project-n
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: project-n
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
