apiVersion: v1
kind: ServiceAccount
metadata:
  name: project-n-sa
  namespace: project-n
  annotations:
    # Enforce mountable secrets (required for some RBAC scenarios)
    kubernetes.io/enforce-mountable-secrets: "true"
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: project-n

# Disable automatic secret mounting (best practice for security)
automountServiceAccountToken: false
