# Hostnames must match the Gateway listeners in gateway.yaml and the TLS cert in secret.yaml
# HTTP → HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: project-n-redirect
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
spec:
  parentRefs:
    - name: project-n-gw
      namespace: project-n
      sectionName: http
  hostnames:
    - project-n.example.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# HTTPS → backend
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: project-n-route
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
spec:
  parentRefs:
    - name: project-n-gw
      namespace: project-n
      sectionName: https
  hostnames:
    - project-n.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: project-n-svc
          port: 80
