apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: project-n-gw
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        # Secret must exist in the same namespace; provision with cert-manager or manually
        certificateRefs:
          - name: project-n-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
