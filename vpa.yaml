apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: project-n-vpa
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: autoscaler
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: project-n-deployment
  updatePolicy:
    # "Off" - recommendations only, no evictions. Safe alongside HPA because
    # VPA never mutates the Deployment. Use "Recreate" or "InPlaceOrRecreate"
    # only after removing HPA or switching HPA to custom/external metrics.
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: project-n
        # RequestsOnly - VPA adjusts requests but never touches limits.
        # Required for safe HPA coexistence: HPA owns the limits signal.
        controlledValues: RequestsOnly
        controlledResources:
          - cpu
          - memory
        # Floor: prevents VPA from recommending below the minimum viable baseline
        minAllowed:
          cpu: 50m
          memory: 64Mi
        # Ceiling: prevents runaway recommendations from exhausting node capacity
        maxAllowed:
          cpu: "2"
          memory: 2Gi
