apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-n-deployment
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/version: "1.0.0"
spec:
  # replicas is intentionally omitted - managed by HPA
  # replicas: 1

  # Keep only 3 old ReplicaSets for rollback
  revisionHistoryLimit: 3

  # Fail the rollout if it hasn't progressed within 10 minutes
  progressDeadlineSeconds: 600

  # Pod must be ready for 10s before considered available (prevents premature traffic)
  minReadySeconds: 10

  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Allow 1 extra pod during rollout so capacity is never reduced
      maxSurge: 1
      # Never take a pod down before a new one is ready
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: project-n

  template:
    metadata:
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
      labels:
        app.kubernetes.io/name: project-n
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: project-n
        app.kubernetes.io/version: "1.0.0"

    spec:
      serviceAccountName: project-n-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      # Required by PSA restricted profile
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # Spread pods evenly across nodes to avoid single points of failure
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: project-n

      containers:
        - name: project-n
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: Always

          # Expose the port your application listens on
          ports:
            - containerPort: 8080
              protocol: TCP

          resources:
            # Explicit requests/limits ensure HPA has metrics to act on
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 128Mi

          # Configure probes for your application
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 2

          # Drain in-flight requests before SIGTERM is sent
          lifecycle:
            preStop:
              exec:
                command: [ "/bin/sh", "-c", "sleep 5" ]

          securityContext:
            # Satisfies PSA restricted profile
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          # Load all ConfigMap keys as environment variables
          envFrom:
            - configMapRef:
                name: project-n-cm

          # Sample volumeMounts - adjust to match your image's writable dir requirements
          volumeMounts:
            - name: tmp
              mountPath: /tmp
              readOnly: false

            # Mount secret as files - safer than env vars (not captured in crash dumps or logs)
            - name: secret
              mountPath: /etc/secret
              readOnly: true

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi

        - name: secret
          secret:
            # defaultMode 0400 - owner read-only; pods run as non-root so world-read is unnecessary
            defaultMode: 400
            secretName: project-n-secret
