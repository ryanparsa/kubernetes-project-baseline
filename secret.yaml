apiVersion: v1
kind: Secret
metadata:
  name: project-n-secret
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl

type: Opaque
# stringData is base64-encoded automatically by Kubernetes on apply
# In production, manage this with Sealed Secrets, External Secrets, or Vault

stringData:
  # Mounted as /etc/secret/credentials.json inside the container
  credentials.json: |
    {
      "api_key": "replace-me",
      "api_secret": "replace-me"
    }

---
apiVersion: v1
kind: Secret
metadata:
  name: project-n-tls
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl

# Referenced by gateway.yaml for HTTPS TLS termination
# In production, provision this with cert-manager instead of managing it manually
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    replace-me
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    replace-me
    -----END PRIVATE KEY-----
