apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: project-n-pdb
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
spec:
  # maxUnavailable scales correctly with HPA - always limits to 1 disruption
  # regardless of current replica count (unlike a fixed minAvailable: 2)
  maxUnavailable: 1
  # Allow eviction of unhealthy pods (crashlooping, OOMKilled) even when at
  # budget limit, so a broken pod never blocks a node drain or cluster upgrade
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      app.kubernetes.io/name: project-n
