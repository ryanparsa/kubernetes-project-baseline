apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: project-n-pdb
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
spec:
  # Keep at least 2 pods running during voluntary disruptions (node drain, rolling update)
  # Matches HPA minReplicas: 3 - always leaves one spare for disruptions
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: project-n
