apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: project-n-role
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
# Grant only what the application actually calls via the K8s API.
# Use resourceNames to restrict to specific named resources (least privilege).
# Common starting points - uncomment and trim to what your app needs:
rules: []
