  #   resources: ["configmaps"]
  #   resourceNames: ["project-n-cm"]
  #   verbs: ["get", "watch"]

  # Read own Secret (prefer mounting as a file via the Deployment instead)
  # - apiGroups: [""]
  #   resources: ["secrets"]
  #   resourceNames: ["project-n-secret"]
  #   verbs: ["get"]

  # Emit events (controllers and operators that surface status to kubectl describe)
  # - apiGroups: [""]
  #   resources: ["events"]
  #   verbs: ["create", "patch"]

  # Leader election via Lease (preferred over ConfigMap/Endpoint locks)
  # - apiGroups: ["coordination.k8s.io"]
