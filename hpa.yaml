apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: project-n-hpa
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: autoscaler
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: project-n-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    # Memory does not compress - apps rarely release it quickly, so memory-driven
    # scale-down can lag actual demand. Treat this as a ceiling guard, not a
    # primary signal. Remove if your app does not have predictable memory growth.
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      # No stabilization on the way up - respond to load spikes immediately
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        # Double replicas every 15s, or add 4 at once - whichever is larger
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
    scaleDown:
      # Require 5 minutes of sustained low load before acting (avoids thrashing)
      stabilizationWindowSeconds: 300
      # Min picks the most conservative of the two policies each period
      selectPolicy: Min
      policies:
        # Remove at most 25% of current replicas per minute
        - type: Percent
          value: 25
          periodSeconds: 60
        # Never remove more than 2 pods at once regardless of replica count
        - type: Pods
          value: 2
          periodSeconds: 60
