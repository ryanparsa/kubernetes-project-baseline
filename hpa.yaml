apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: project-n-hpa
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/component: autoscaler
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: project-n-deployment
  minReplicas: 1
  maxReplicas: 10
  metrics:
    # Scale out when average CPU utilization across pods exceeds 50%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    # Scale out when average memory utilization across pods exceeds 50%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50
